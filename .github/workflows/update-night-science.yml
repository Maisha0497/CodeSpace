name: Update Night Science Dispatch

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update stories.json from science feeds
        run: python scripts/update_night_science.py
      - name: Commit updated stories if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bedtime-physics/stories.json
          if git diff --cached --quiet; then
            echo "No story changes to commit."
          else
            git commit -m "Update night science stories"
            git push
          fi
